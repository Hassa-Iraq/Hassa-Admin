name: Deploy Admin Frontend

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-admin-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build Validation
        run: |
          npm ci
          npm run build

      - name: Setup SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${VPS_PORT:-22}" "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy On VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${VPS_PORT:-22}" "${VPS_USER}@${VPS_HOST}" \
            "cd '${DEPLOY_PATH:-/var/www/hassa-admin}' && \
             chmod +x scripts/deploy/deploy-frontend.sh scripts/deploy/rollback-frontend.sh && \
             DOMAIN='keydevs.pk' \
             ADMIN_DOMAIN='adminhassa.keydevs.pk' \
             LETSENCRYPT_EMAIL='${{ secrets.LETSENCRYPT_EMAIL }}' \
             DEPLOY_PATH='${DEPLOY_PATH:-/var/www/hassa-admin}' \
             DEPLOY_BRANCH='main' \
             APP_PORT='3008' \
             SERVICE_NAME='hassa-admin-frontend' \
             SITE_FILENAME='hassa-admin-frontend.conf' \
             ./scripts/deploy/deploy-frontend.sh"

      - name: Health Check
        run: |
          TARGET_DOMAIN="adminhassa.keydevs.pk"
          curl -fSsL "https://${TARGET_DOMAIN}/" >/dev/null
          echo "Health check passed at https://${TARGET_DOMAIN}/"

      - name: Rollback On Failure
        if: failure()
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${VPS_PORT:-22}" "${VPS_USER}@${VPS_HOST}" \
            "cd '${DEPLOY_PATH:-/var/www/hassa-admin}' && \
             DEPLOY_PATH='${DEPLOY_PATH:-/var/www/hassa-admin}' \
             DEPLOY_BRANCH='main' \
             SERVICE_NAME='hassa-admin-frontend' \
             ./scripts/deploy/rollback-frontend.sh"

      - name: Deployment Summary
        if: always()
        run: |
          echo "Branch: main"
          echo "Commit: ${GITHUB_SHA}"
          echo "VPS Host: ${VPS_HOST}"
          echo "Deploy path: ${DEPLOY_PATH:-/var/www/hassa-admin}"
